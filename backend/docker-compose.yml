version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: cityflow_user
      POSTGRES_PASSWORD: cityflow_password
      POSTGRES_DB: cityflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cityflow-network

  mlflow:
    image: python:3.11-slim
    command: >
      sh -c "pip install --no-cache-dir mlflow && mlflow server
      --host 0.0.0.0
      --port 5000
      --allowed-hosts localhost,127.0.0.1,localhost:5000,mlflow,mlflow:5000,host.docker.internal,host.docker.internal:5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - cityflow-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - cityflow-network

  ollama_pull:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    command: >
      sh -c "sleep 5 && curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3\"}'"
    networks:
      - cityflow-network

  fastapi:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../cityflow_ml_lab/models:/app/models:ro
      - ./chroma_db:/app/backend/chroma_db
    environment:
      - DATABASE_URL=postgresql://cityflow_user:cityflow_password@db:5432/cityflow_db
      - OLLAMA_HOST=http://ollama:11434
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - METRICS_BEARER_TOKEN=cityflow-internal-metrics-token
    depends_on:
      - db
      - ollama
      - mlflow
    networks:
      - cityflow-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /sys:/sys:ro
    privileged: true
    networks:
      - cityflow-network

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - fastapi
      - cadvisor
    networks:
      - cityflow-network

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - cityflow-network

volumes:
  postgres_data:
  ollama_data:
  mlflow_data:
  prometheus_data:
  grafana_data:

networks:
  cityflow-network:
    name: cityflow-network
