version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: cityflow_user
      POSTGRES_PASSWORD: cityflow_password
      POSTGRES_DB: cityflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mlflow:
    image: python:3.11-slim
    command: >
      sh -c "pip install --no-cache-dir mlflow && mlflow server
      --host 0.0.0.0
      --port 5000
      --allowed-hosts localhost,127.0.0.1,localhost:5000,mlflow,mlflow:5000,host.docker.internal,host.docker.internal:5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama_pull:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    command: >
      sh -c "sleep 5 && curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3\"}'"

  fastapi:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../cityflow_ml_lab/models:/app/models:ro
      - ./chroma_db:/app/backend/chroma_db
    environment:
      - DATABASE_URL=postgresql://cityflow_user:cityflow_password@db:5432/cityflow_db
      - OLLAMA_HOST=http://ollama:11434
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - db
      - ollama
      - mlflow

volumes:
  postgres_data:
  ollama_data:
  mlflow_data:
