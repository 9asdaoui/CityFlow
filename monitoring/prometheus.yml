global:
  scrape_interval: 5s

scrape_configs:
  - job_name: fastapi-backend
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials: cityflow-internal-metrics-token
    static_configs:
      - targets: ["fastapi:8000"]

  - job_name: ollama-cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
